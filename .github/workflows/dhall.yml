name: Type-check Dhall Contract

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Dhall
        uses: dhall-lang/setup-dhall@v4

      - name: Type-check Project.dhall
        run: dhall type --file dhall/Project.dhall

      - name: Type-check module.dhall
        run: dhall type --file dhall/module.dhall
